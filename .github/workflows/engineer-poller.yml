name: Engineer Poller

# Auto-trigger for the Engineer workflow. Every 5 minutes, looks at Notion
# cards in "working on it" status and dispatches engineer.yml for the first
# one if no Engineer run is already in flight.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: engineer-poller
      cancel-in-progress: false

    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_BACKLOG_DB_ID: ${{ secrets.NOTION_BACKLOG_DB_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run poller
        id: poll
        run: |
          CARD_ID=$(npx tsx scripts/agent/poller.ts)
          if [ -n "$CARD_ID" ]; then
            echo "card_id=$CARD_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch Engineer
        if: steps.poll.outputs.card_id != ''
        run: gh workflow run engineer.yml -f card_id="${{ steps.poll.outputs.card_id }}"

      - name: Notify dispatch
        if: steps.poll.outputs.card_id != ''
        run: |
          npx tsx scripts/agent/notify.ts --kind=status "Engineer auto-dispatched for card ${{ steps.poll.outputs.card_id }}
          Runs: https://github.com/${{ github.repository }}/actions/workflows/engineer.yml"
