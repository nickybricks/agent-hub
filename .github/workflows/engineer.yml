name: Engineer Agent

on:
  workflow_dispatch:
    inputs:
      card_id:
        description: Notion card (page) ID
        required: true
        type: string

# Use AGENT_GH_TOKEN (PAT) for checkout/push so the resulting PR triggers
# Vercel preview builds. GITHUB_TOKEN cannot trigger downstream workflows.
jobs:
  engineer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Serialize Engineer runs so the poller and manual dispatch can't fire
    # two agents at once.
    concurrency:
      group: engineer-agent
      cancel-in-progress: false

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_BACKLOG_DB_ID: ${{ secrets.NOTION_BACKLOG_DB_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Claude Code CLI
        run: npm i -g @anthropic-ai/claude-code

      - name: Materialize .env.local for dev server
        run: |
          cat > .env.local <<'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          E2E_USER_EMAIL=${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD=${{ secrets.E2E_USER_PASSWORD }}
          NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}
          NOTION_BACKLOG_DB_ID=${{ secrets.NOTION_BACKLOG_DB_ID }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      - name: Configure git
        run: |
          git config user.name "mailyn-agent[bot]"
          git config user.email "agent@mailyn.dev"

      - name: Normalize card id
        id: card
        run: |
          # Strip Notion URL fragments and non-hex/dash chars; rebuild branch-safe slug.
          RAW="${{ inputs.card_id }}"
          CLEAN=$(echo "$RAW" | sed -E 's/\?.*$//' | tr -cd 'a-fA-F0-9-')
          if [ -z "$CLEAN" ]; then
            echo "::error::card_id is empty after sanitizing"; exit 1
          fi
          echo "id=$CLEAN" >> "$GITHUB_OUTPUT"
          SLUG=$(echo "$CLEAN" | tr -d '-')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Create working branch
        id: branch
        run: |
          BRANCH="agent/card-${{ steps.card.outputs.slug }}-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Fetch card title
        id: title
        run: |
          TITLE=$(npx tsx scripts/agent/backlog.ts show "${{ steps.card.outputs.id }}" | jq -r .title)
          echo "value=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Claim card in Notion
        run: npx tsx scripts/agent/backlog.ts claim "${{ steps.card.outputs.id }}"

      - name: Run engineer agent
        id: engineer
        run: npx tsx scripts/agent/engineer.ts "${{ steps.card.outputs.id }}"

      - name: Check for changes + capture stats
        id: diff
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "stats=no file changes" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            STATS=$(git diff --shortstat main | sed 's/^ *//')
            FILES=$(git diff --name-only main | wc -l | tr -d ' ')
            echo "stats=$FILES files; $STATS" >> "$GITHUB_OUTPUT"
          fi

      # Card titles can contain ", $, `, etc. Always pass them via env vars
      # to avoid breaking shell quoting via ${{ }} interpolation.
      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        env:
          CARD_TITLE: ${{ steps.title.outputs.value }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git add -A
          git commit -m "agent: $CARD_TITLE"
          git push origin "$BRANCH"

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
          CARD_TITLE: ${{ steps.title.outputs.value }}
          CARD_ID: ${{ steps.card.outputs.id }}
          DIFF_STATS: ${{ steps.diff.outputs.stats }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          BODY=$(printf "Opened by the Engineer agent.\n\n**Notion card:** %s (\`%s\`)\n**Diff:** %s\n\nVerify (lint + typecheck + e2e) passed locally before this PR was opened." "$CARD_TITLE" "$CARD_ID" "$DIFF_STATS")
          PR_URL=$(gh pr create \
            --title "agent: $CARD_TITLE" \
            --body "$BODY" \
            --head "$BRANCH" \
            --base main)
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Send card to Review
        if: steps.pr.outputs.url != ''
        env:
          CARD_ID: ${{ steps.card.outputs.id }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: npx tsx scripts/agent/backlog.ts review "$CARD_ID" --pr="$PR_URL"

      - name: Notify success
        if: steps.pr.outputs.url != ''
        env:
          CARD_TITLE: ${{ steps.title.outputs.value }}
          DIFF_STATS: ${{ steps.diff.outputs.stats }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          npx tsx scripts/agent/notify.ts --kind=pr "PR opened: $CARD_TITLE
          Diff: $DIFF_STATS
          $PR_URL"

      - name: Park card (no-op)
        if: steps.diff.outputs.changed == 'false'
        env:
          CARD_ID: ${{ steps.card.outputs.id }}
        run: npx tsx scripts/agent/backlog.ts park "$CARD_ID"

      - name: Notify no-op
        if: steps.diff.outputs.changed == 'false'
        env:
          CARD_TITLE: ${{ steps.title.outputs.value }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          npx tsx scripts/agent/notify.ts --kind=stuck "Agent exited with no changes on: $CARD_TITLE — card moved back to Backlog
          Run: $RUN_URL"

      - name: Park card (failure)
        if: failure() && steps.card.outputs.id != ''
        env:
          CARD_ID: ${{ steps.card.outputs.id }}
        run: npx tsx scripts/agent/backlog.ts park "$CARD_ID" || true

      - name: Notify failure
        if: failure()
        env:
          CARD_TITLE: ${{ steps.title.outputs.value }}
          FALLBACK_ID: ${{ inputs.card_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          LABEL="${CARD_TITLE:-$FALLBACK_ID}"
          npx tsx scripts/agent/notify.ts --kind=stuck "Engineer workflow failed on card: $LABEL — card moved back to Backlog
          Run: $RUN_URL"
