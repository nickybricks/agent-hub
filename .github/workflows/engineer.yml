name: Engineer Agent

on:
  workflow_dispatch:
    inputs:
      card_id:
        description: Notion card (page) ID
        required: true
        type: string

# Use AGENT_GH_TOKEN (PAT) for checkout/push so the resulting PR triggers
# Vercel preview builds. GITHUB_TOKEN cannot trigger downstream workflows.
jobs:
  engineer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Serialize Engineer runs so the poller and manual dispatch can't fire
    # two agents at once.
    concurrency:
      group: engineer-agent
      cancel-in-progress: false

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_BACKLOG_DB_ID: ${{ secrets.NOTION_BACKLOG_DB_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Claude Code CLI
        run: npm i -g @anthropic-ai/claude-code

      - name: Materialize .env.local for dev server
        run: |
          cat > .env.local <<'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          E2E_USER_EMAIL=${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD=${{ secrets.E2E_USER_PASSWORD }}
          NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}
          NOTION_BACKLOG_DB_ID=${{ secrets.NOTION_BACKLOG_DB_ID }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      - name: Configure git
        run: |
          git config user.name "mailyn-agent[bot]"
          git config user.email "agent@mailyn.dev"

      - name: Normalize card id
        id: card
        run: |
          # Strip Notion URL fragments and non-hex/dash chars; rebuild branch-safe slug.
          RAW="${{ inputs.card_id }}"
          CLEAN=$(echo "$RAW" | sed -E 's/\?.*$//' | tr -cd 'a-fA-F0-9-')
          if [ -z "$CLEAN" ]; then
            echo "::error::card_id is empty after sanitizing"; exit 1
          fi
          echo "id=$CLEAN" >> "$GITHUB_OUTPUT"
          SLUG=$(echo "$CLEAN" | tr -d '-')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Create working branch
        id: branch
        run: |
          BRANCH="agent/card-${{ steps.card.outputs.slug }}-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Fetch card title
        id: title
        run: |
          TITLE=$(npx tsx scripts/agent/backlog.ts show "${{ steps.card.outputs.id }}" | jq -r .title)
          echo "value=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Claim card in Notion
        run: npx tsx scripts/agent/backlog.ts claim "${{ steps.card.outputs.id }}"

      - name: Run engineer agent
        id: engineer
        run: npx tsx scripts/agent/engineer.ts "${{ steps.card.outputs.id }}"

      - name: Classify run outcome
        id: outcome
        run: |
          # Three modes:
          #   "pr"        — agent made code changes; open a PR.
          #   "questions" — no code changes, but the agent wrote a plan.md
          #                 with at least one BLOCKING question. Forward to
          #                 the human via 🟡 Telegram.
          #   "noop"      — no changes, no plan. Treat as stuck.
          # Diff check ignores untracked .agent/ files — those don't count as
          # "code changes" by themselves.
          if git diff --quiet -- . ':(exclude).agent' && git diff --cached --quiet -- . ':(exclude).agent'; then
            CODE_CHANGED=false
          else
            CODE_CHANGED=true
          fi

          if [ "$CODE_CHANGED" = "true" ]; then
            STATS=$(git diff --shortstat main -- . ':(exclude).agent' | sed 's/^ *//')
            FILES=$(git diff --name-only main -- . ':(exclude).agent' | wc -l | tr -d ' ')
            echo "mode=pr" >> "$GITHUB_OUTPUT"
            echo "stats=$FILES files; $STATS" >> "$GITHUB_OUTPUT"
          elif [ -f .agent/plan.md ] && grep -q "BLOCKING:" .agent/plan.md; then
            echo "mode=questions" >> "$GITHUB_OUTPUT"
            echo "stats=no code changes; agent asked questions" >> "$GITHUB_OUTPUT"
          else
            echo "mode=noop" >> "$GITHUB_OUTPUT"
            echo "stats=no file changes" >> "$GITHUB_OUTPUT"
          fi

      # Card titles can contain ", $, `, etc. Always pass them via env vars
      # to avoid breaking shell quoting via ${{ }} interpolation.
      - name: Commit and push
        if: steps.outcome.outputs.mode == 'pr'
        env:
          CARD_TITLE: ${{ steps.title.outputs.value }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git add -A
          git commit -m "agent: $CARD_TITLE"
          git push origin "$BRANCH"

      - name: Build PR body from decisions.md
        if: steps.outcome.outputs.mode == 'pr'
        env:
          CARD_TITLE: ${{ steps.title.outputs.value }}
          CARD_ID: ${{ steps.card.outputs.id }}
          DIFF_STATS: ${{ steps.outcome.outputs.stats }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Header always present; body uses the agent's own decisions.md if
          # it exists. Falls back to a minimal stub so the PR isn't blank.
          mkdir -p .agent
          {
            printf "Opened by the Engineer agent.\n\n"
            printf -- "- **Notion card:** %s (\`%s\`)\n" "$CARD_TITLE" "$CARD_ID"
            printf -- "- **Diff:** %s\n" "$DIFF_STATS"
            printf -- "- **Run:** %s\n\n" "$RUN_URL"
            printf -- "---\n\n"
            if [ -f .agent/decisions.md ]; then
              cat .agent/decisions.md
            else
              printf "_The agent did not write \`.agent/decisions.md\` for this run. No structured reasoning available — review the diff carefully._\n"
            fi
          } > .agent/pr-body.md

      - name: Open PR
        if: steps.outcome.outputs.mode == 'pr'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
          CARD_TITLE: ${{ steps.title.outputs.value }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          PR_URL=$(gh pr create \
            --title "agent: $CARD_TITLE" \
            --body-file .agent/pr-body.md \
            --head "$BRANCH" \
            --base main)
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Send card to Review
        if: steps.pr.outputs.url != ''
        env:
          CARD_ID: ${{ steps.card.outputs.id }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: npx tsx scripts/agent/backlog.ts review "$CARD_ID" --pr="$PR_URL"

      - name: Notify success
        if: steps.pr.outputs.url != ''
        env:
          CARD_TITLE: ${{ steps.title.outputs.value }}
          DIFF_STATS: ${{ steps.outcome.outputs.stats }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          # Lead the ping with the "In plain English" paragraph from
          # decisions.md so a non-engineer can read it at a glance.
          PLAIN=""
          if [ -f .agent/decisions.md ]; then
            PLAIN=$(awk '/^## In plain English/{flag=1;next} /^## /{flag=0} flag' .agent/decisions.md | sed '/^$/d' | head -10)
          fi
          {
            printf "PR opened: %s\n" "$CARD_TITLE"
            if [ -n "$PLAIN" ]; then
              printf "\nWhat changed (in plain English):\n%s\n" "$PLAIN"
            fi
            printf "\nDiff: %s\n%s" "$DIFF_STATS" "$PR_URL"
          } > .agent/notify-success.txt
          npx tsx scripts/agent/notify.ts --kind=pr "$(cat .agent/notify-success.txt)"

      # 🟡 Agent decided it can't safely act — wrote a plan with BLOCKING
      # questions and exited. Forward the questions to Telegram so the human
      # can sharpen the card.
      - name: Park card (questions)
        if: steps.outcome.outputs.mode == 'questions'
        env:
          CARD_ID: ${{ steps.card.outputs.id }}
        run: npx tsx scripts/agent/backlog.ts park "$CARD_ID"

      - name: Notify questions
        if: steps.outcome.outputs.mode == 'questions'
        env:
          CARD_TITLE: ${{ steps.title.outputs.value }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Telegram caps messages at ~4096 chars. Truncate the plan to ~3500
          # to leave room for header + footer.
          PLAN=$(head -c 3500 .agent/plan.md)
          {
            printf "Engineer paused on: %s\n\n" "$CARD_TITLE"
            printf "The agent wrote a plan with open questions and is waiting for clearer guidance. Card moved back to Backlog.\n\n"
            printf -- "--- plan ---\n%s\n" "$PLAN"
            printf "\nFull run: %s" "$RUN_URL"
          } > .agent/notify-questions.txt
          npx tsx scripts/agent/notify.ts --kind=decision "$(cat .agent/notify-questions.txt)"

      - name: Park card (noop)
        if: steps.outcome.outputs.mode == 'noop'
        env:
          CARD_ID: ${{ steps.card.outputs.id }}
        run: npx tsx scripts/agent/backlog.ts park "$CARD_ID"

      - name: Notify noop
        if: steps.outcome.outputs.mode == 'noop'
        env:
          CARD_TITLE: ${{ steps.title.outputs.value }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          npx tsx scripts/agent/notify.ts --kind=stuck "Agent exited with no changes and no plan on: $CARD_TITLE — card moved back to Backlog.
          This usually means the agent didn't follow its instructions. Inspect the run.
          Run: $RUN_URL"

      - name: Park card (failure)
        if: failure() && steps.card.outputs.id != ''
        env:
          CARD_ID: ${{ steps.card.outputs.id }}
        run: npx tsx scripts/agent/backlog.ts park "$CARD_ID" || true

      - name: Notify failure
        if: failure()
        env:
          CARD_TITLE: ${{ steps.title.outputs.value }}
          FALLBACK_ID: ${{ inputs.card_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          LABEL="${CARD_TITLE:-$FALLBACK_ID}"
          # If the agent wrote a verify-failure.txt, include a truncated
          # excerpt so the human sees what actually broke without opening
          # the full GH Actions log.
          DETAIL=""
          if [ -f .agent/verify-failure.txt ]; then
            DETAIL=$(tail -c 2500 .agent/verify-failure.txt)
          fi
          mkdir -p .agent
          {
            printf "Engineer workflow failed on card: %s — card moved back to Backlog\n" "$LABEL"
            if [ -n "$DETAIL" ]; then
              printf "\n--- last verify output ---\n%s\n" "$DETAIL"
            fi
            printf "\nRun: %s" "$RUN_URL"
          } > .agent/notify-failure.txt
          npx tsx scripts/agent/notify.ts --kind=stuck "$(cat .agent/notify-failure.txt)"
