name: PM Morning

# Runs the PM agent once per trigger. Primary trigger is a Vercel cron
# (daily 09:00 Europe/Berlin → 07:00 / 08:00 UTC depending on DST) that
# hits /api/cron/pm-morning, which calls workflow_dispatch here.
# workflow_dispatch is also exposed for manual runs and for the future
# "text the bot to re-pitch" path.
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: pm-morning
      cancel-in-progress: false

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_BACKLOG_DB_ID: ${{ secrets.NOTION_BACKLOG_DB_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PM agent
        run: npx tsx scripts/agent/pm.ts
